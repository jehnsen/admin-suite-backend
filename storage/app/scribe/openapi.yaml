    post:
      summary: 'Create new training record'
      operationId: createNewTrainingRecord
      description: ''
      parameters: []
      responses: {  }
      tags:
        - Endpoints
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                employee_id:
                  type: integer
                  description: 'The <code>id</code> of an existing record in the employees table.'
                  example: 16
                training_title:
                  type: string
                  description: 'Must not be greater than 255 characters.'
                  example: 'n'
                training_type:
                  type: string
                  description: 'Must not be greater than 100 characters.'
                  example: g
                date_from:
                  type: string
                  description: 'Must be a valid date.'
                  example: '2026-05-20T08:10:02'
                date_to:
                  type: string
                  description: 'Must be a valid date. Must be a date after or equal to <code>date_from</code>.'
                  example: '2052-06-12'
                description:
                  type: string
                  description: ''
                  example: 'Eius et animi quos velit et.'
                  nullable: true
                conducted_by:
                  type: string
                  description: 'Must not be greater than 255 characters.'
                  example: v
                  nullable: true
                venue:
                  type: string
                  description: 'Must not be greater than 255 characters.'
                  example: d
                  nullable: true
                venue_type:
                  type: string
                  description: 'Must not be greater than 50 characters.'
                  example: l
                  nullable: true
                number_of_hours:
                  type: number
                  description: 'Must be at least 0.'
                  example: 9
                  nullable: true
                ld_units:
                  type: number
                  description: 'Must be at least 0.'
                  example: 52
                  nullable: true
                certificate_number:
                  type: string
                  description: 'Must not be greater than 100 characters.'
                  example: i
                  nullable: true
                certificate_date:
                  type: string
                  description: 'Must be a valid date.'
                  example: '2026-05-20T08:10:02'
                  nullable: true
                sponsorship:
                  type: string
                  description: 'Must not be greater than 255 characters.'
                  example: k
                  nullable: true
                cost:
                  type: number
                  description: 'Must be at least 0.'
                  example: 7
                  nullable: true
                status:
                  type: string
                  description: 'Must not be greater than 50 characters.'
                  example: w
                  nullable: true
                remarks:
                  type: string
                  description: ''
                  example: architecto
                  nullable: true
              required:
                - employee_id
                - training_title
                - training_type
                - date_from
                - date_to
