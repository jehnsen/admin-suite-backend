openapi: 3.0.3
info:
  title: 'AdminSuite API API Documentation'
  description: 'REST API for AdminSuite — the administrative management system for DepEd Administrative Officers. Covers personnel (employees, leave, service records, trainings), inventory (items, issuances, RIS), attendance (biometric CSV import, DTR), government reports (Form 6, RIS, DV, IAR, PDS), and financial tracking.'
  version: 1.0.0
servers:
  -
    url: 'http://localhost:8000'
tags:
  -
    name: Authentication
    description: "\nAPIs for user authentication using Laravel Sanctum."
  -
    name: 'Dashboard - Administrative Officer Command Center'
    description: "\nAPIs for dashboard metrics including expiring budgets, critical stock levels, and step increment alerts."
  -
    name: Endpoints
    description: ''
  -
    name: 'HR Management - Attendance Records'
    description: "\nAPIs for managing daily time records (DTR) including creation, CSV import, and approval workflows."
  -
    name: 'HR Management - Employees'
    description: "\nAPIs for managing employee records, including creation, updates, promotions, and leave credit management."
  -
    name: 'HR Management - Leave Requests'
    description: "\nAPIs for managing employee leave requests with approval workflow."
  -
    name: 'HR Management - Service Records'
    description: "\nAPIs for managing employee service records (201 files)."
  -
    name: 'User Management'
    description: "\nAdmin-only endpoints for managing user accounts.\nOnly Admin Officer and Super Admin can create/manage users."
components:
  securitySchemes:
    default:
      type: http
      scheme: bearer
      description: 'Obtain a token by calling <code>POST /api/auth/login</code> with your DepEd email and password. Include it as <code>Authorization: Bearer {token}</code> on every subsequent request.'
security:
  -
    default: []
paths:
  /api/auth/login:
    post:
      summary: Login
      operationId: login
      description: 'Authenticate user and generate API token.'
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'Login successful'
                  token: 1|xxxxxxxxxxxxxxxxxxx
                  user:
                    id: 1
                    name: 'Juan dela Cruz'
                    email: juan.delacruz@deped.gov.ph
                properties:
                  message:
                    type: string
                    example: 'Login successful'
                  token:
                    type: string
                    example: 1|xxxxxxxxxxxxxxxxxxx
                  user:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 1
                      name:
                        type: string
                        example: 'Juan dela Cruz'
                      email:
                        type: string
                        example: juan.delacruz@deped.gov.ph
        401:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'Invalid credentials'
                properties:
                  message:
                    type: string
                    example: 'Invalid credentials'
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  description: "User's email address."
                  example: juan.delacruz@deped.gov.ph
                password:
                  type: string
                  description: "User's password."
                  example: Password123!
              required:
                - email
                - password
  /api/auth/logout:
    post:
      summary: Logout
      operationId: logout
      description: "Revoke the user's current API token."
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'Logout successful'
                properties:
                  message:
                    type: string
                    example: 'Logout successful'
      tags:
        - Authentication
  /api/dashboard/metrics:
    get:
      summary: 'Get comprehensive dashboard metrics'
      operationId: getComprehensiveDashboardMetrics
      description: "Retrieve all dashboard metrics in a single call including expiring budgets,\ncritical stock items, and employees due for step increment."
      parameters:
        -
          in: query
          name: budget_days
          description: 'Days to check for expiring budgets.'
          example: 60
          required: false
          schema:
            type: integer
            description: 'Days to check for expiring budgets.'
            example: 60
        -
          in: query
          name: stock_prediction_days
          description: 'Days to predict stockout.'
          example: 14
          required: false
          schema:
            type: integer
            description: 'Days to predict stockout.'
            example: 14
        -
          in: query
          name: stock_usage_window
          description: 'Days to analyze for usage patterns.'
          example: 30
          required: false
          schema:
            type: integer
            description: 'Days to analyze for usage patterns.'
            example: 30
        -
          in: query
          name: step_increment_days
          description: 'Days to check for due step increments.'
          example: 60
          required: false
          schema:
            type: integer
            description: 'Days to check for due step increments.'
            example: 60
        -
          in: query
          name: step_increment_months
          description: 'Months required for step increment eligibility.'
          example: 36
          required: false
          schema:
            type: integer
            description: 'Months required for step increment eligibility.'
            example: 36
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  data:
                    alerts:
                      expiring_budgets: []
                      critical_stock_items: []
                      step_increments_due: []
                    summary:
                      total_alerts: 15
                      expiring_budgets_count: 3
                      critical_stock_items_count: 7
                      step_increments_due_count: 5
                      high_priority_count: 4
                    high_priority_alerts: []
                    generated_at: '2026-02-06T10:30:00.000000Z'
                properties:
                  data:
                    type: object
                    properties:
                      alerts:
                        type: object
                        properties:
                          expiring_budgets:
                            type: array
                            example: []
                          critical_stock_items:
                            type: array
                            example: []
                          step_increments_due:
                            type: array
                            example: []
                      summary:
                        type: object
                        properties:
                          total_alerts:
                            type: integer
                            example: 15
                          expiring_budgets_count:
                            type: integer
                            example: 3
                          critical_stock_items_count:
                            type: integer
                            example: 7
                          step_increments_due_count:
                            type: integer
                            example: 5
                          high_priority_count:
                            type: integer
                            example: 4
                      high_priority_alerts:
                        type: array
                        example: []
                      generated_at:
                        type: string
                        example: '2026-02-06T10:30:00.000000Z'
      tags:
        - 'Dashboard - Administrative Officer Command Center'
  /api/dashboard/expiring-budgets:
    get:
      summary: 'Get only expiring budget alerts'
      operationId: getOnlyExpiringBudgetAlerts
      description: 'Retrieve budgets that are expiring within the specified number of days.'
      parameters:
        -
          in: query
          name: within_days
          description: 'Days to check for expiring budgets. Defaults to 60.'
          example: 60
          required: false
          schema:
            type: integer
            description: 'Days to check for expiring budgets. Defaults to 60.'
            example: 60
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  data:
                    -
                      id: 5
                      budget_name: 'Training Fund'
                      fund_source: MOOE
                      remaining_balance: 15000.0
                      end_date: '2026-04-15'
                      days_until_expiry: 45
                      alert_message: 'MOOE - Training Fund expires in 45 days. You have ₱15,000.00 remaining.'
                properties:
                  data:
                    type: array
                    example:
                      -
                        id: 5
                        budget_name: 'Training Fund'
                        fund_source: MOOE
                        remaining_balance: 15000
                        end_date: '2026-04-15'
                        days_until_expiry: 45
                        alert_message: 'MOOE - Training Fund expires in 45 days. You have ₱15,000.00 remaining.'
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          example: 5
                        budget_name:
                          type: string
                          example: 'Training Fund'
                        fund_source:
                          type: string
                          example: MOOE
                        remaining_balance:
                          type: number
                          example: 15000.0
                        end_date:
                          type: string
                          example: '2026-04-15'
                        days_until_expiry:
                          type: integer
                          example: 45
                        alert_message:
                          type: string
                          example: 'MOOE - Training Fund expires in 45 days. You have ₱15,000.00 remaining.'
      tags:
        - 'Dashboard - Administrative Officer Command Center'
  /api/dashboard/critical-stock:
    get:
      summary: 'Get only critical stock items'
      operationId: getOnlyCriticalStockItems
      description: 'Retrieve inventory items predicted to run out based on usage patterns.'
      parameters:
        -
          in: query
          name: prediction_days
          description: 'Days to predict stockout. Defaults to 14.'
          example: 14
          required: false
          schema:
            type: integer
            description: 'Days to predict stockout. Defaults to 14.'
            example: 14
        -
          in: query
          name: usage_window
          description: 'Days to analyze for usage patterns. Defaults to 30.'
          example: 30
          required: false
          schema:
            type: integer
            description: 'Days to analyze for usage patterns. Defaults to 30.'
            example: 30
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  data:
                    -
                      id: 12
                      item_name: 'Bond Paper (A4)'
                      unit: reams
                      current_balance: 25
                      avg_daily_consumption: 3.5
                      days_until_stockout: 7
                      predicted_stockout_date: '2026-02-13'
                      alert_message: "Based on last month's usage, your Bond Paper (A4) will run out in 7 days (by Thursday, February 13, 2026)."
                properties:
                  data:
                    type: array
                    example:
                      -
                        id: 12
                        item_name: 'Bond Paper (A4)'
                        unit: reams
                        current_balance: 25
                        avg_daily_consumption: 3.5
                        days_until_stockout: 7
                        predicted_stockout_date: '2026-02-13'
                        alert_message: "Based on last month's usage, your Bond Paper (A4) will run out in 7 days (by Thursday, February 13, 2026)."
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          example: 12
                        item_name:
                          type: string
                          example: 'Bond Paper (A4)'
                        unit:
                          type: string
                          example: reams
                        current_balance:
                          type: integer
                          example: 25
                        avg_daily_consumption:
                          type: number
                          example: 3.5
                        days_until_stockout:
                          type: integer
                          example: 7
                        predicted_stockout_date:
                          type: string
                          example: '2026-02-13'
                        alert_message:
                          type: string
                          example: "Based on last month's usage, your Bond Paper (A4) will run out in 7 days (by Thursday, February 13, 2026)."
      tags:
        - 'Dashboard - Administrative Officer Command Center'
  /api/dashboard/step-increments-due:
    get:
      summary: 'Get only employees due for step increment'
      operationId: getOnlyEmployeesDueForStepIncrement
      description: 'Retrieve permanent employees who are due for step increment within the specified period.'
      parameters:
        -
          in: query
          name: within_days
          description: 'Days to check for due step increments. Defaults to 60.'
          example: 60
          required: false
          schema:
            type: integer
            description: 'Days to check for due step increments. Defaults to 60.'
            example: 60
        -
          in: query
          name: eligibility_months
          description: 'Months required for step increment eligibility. Defaults to 36.'
          example: 36
          required: false
          schema:
            type: integer
            description: 'Months required for step increment eligibility. Defaults to 36.'
            example: 36
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  data:
                    -
                      id: 8
                      employee_number: 2021-0045
                      employee_name: 'Maria Juana Santos'
                      position: 'Teacher III'
                      current_step: 3
                      next_step: 4
                      last_increment_date: '2023-02-15'
                      months_since_last_increment: 36
                      next_increment_date: '2026-02-15'
                      days_until_due: 9
                      alert_message: "Maria Juana Santos's Step Increment (Step 3 → 4) is due in 9 days (February 15, 2026). Prepare NOSA (Notice of Salary Adjustment)."
                properties:
                  data:
                    type: array
                    example:
                      -
                        id: 8
                        employee_number: 2021-0045
                        employee_name: 'Maria Juana Santos'
                        position: 'Teacher III'
                        current_step: 3
                        next_step: 4
                        last_increment_date: '2023-02-15'
                        months_since_last_increment: 36
                        next_increment_date: '2026-02-15'
                        days_until_due: 9
                        alert_message: "Maria Juana Santos's Step Increment (Step 3 → 4) is due in 9 days (February 15, 2026). Prepare NOSA (Notice of Salary Adjustment)."
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          example: 8
                        employee_number:
                          type: string
                          example: 2021-0045
                        employee_name:
                          type: string
                          example: 'Maria Juana Santos'
                        position:
                          type: string
                          example: 'Teacher III'
                        current_step:
                          type: integer
                          example: 3
                        next_step:
                          type: integer
                          example: 4
                        last_increment_date:
                          type: string
                          example: '2023-02-15'
                        months_since_last_increment:
                          type: integer
                          example: 36
                        next_increment_date:
                          type: string
                          example: '2026-02-15'
                        days_until_due:
                          type: integer
                          example: 9
                        alert_message:
                          type: string
                          example: "Maria Juana Santos's Step Increment (Step 3 → 4) is due in 9 days (February 15, 2026). Prepare NOSA (Notice of Salary Adjustment)."
      tags:
        - 'Dashboard - Administrative Officer Command Center'
